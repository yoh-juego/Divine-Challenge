<!DOCTYPE html>
<html>
<head>
  <title>Divine Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🔝 TOP BAR -->
  <div class="top-bar">
    <div id="hearts"></div>
    <div id="turn"></div>
    <div id="level"></div>
    <div id="timer"></div>
  </div>

  <!-- 🎮 GAME BOARD -->
  <div id="board" class="board"></div>

  <!-- 🟡 POPUP -->
  <div id="popup" class="popup">
    <div id="winnerText"></div>
  <button onclick = "confirmStart()"> START </button>
  </div>

<!-- 🔊 SOUNDS -->
<audio id="bgMusic" loop>
  <source src="https://www.soundjay.com/free-music/sounds/music-1.mp3">
</audio>

<audio id="flipSound">
  <source src="https://www.soundjay.com/button/sounds/button-16.mp3">
</audio>

<audio id="winSound">
  <source src="https://www.soundjay.com/human/sounds/applause-8.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
