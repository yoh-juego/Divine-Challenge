<!DOCTYPE html>
<html>
<head>
  <title>Divine Challenge</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
      height: 100vh;
      overflow: hidden;

      /* 🖼️ YOUR BACKGROUND IMAGE */
      background: url("file:///C:/Users/DELL/Desktop/memory%20game/background.jpg.jpeg") no-repeat center center/cover;
    }

    /* DARK OVERLAY */
    .overlay {
      background: rgba(0, 0, 0, 0.5);
      height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 30px;
    }

    /* 🔥 BUTTON STYLE */
    .play-btn {
      padding: 15px 40px;
      font-size: 20px;
      background: gold;
      color: black;
      border: none;
      border-radius: 10px;
      cursor: pointer;

      transition: 0.3s;
      box-shadow: 0 0 15px gold;
    }

    .play-btn:hover {
      background: orange;
      transform: scale(1.1);
      box-shadow: 0 0 25px orange;
    }
  </style>
</head>

<body>

<div class="overlay">
  <h1>⚡ DIVINE CHALLENGE ⚡</h1>
  <h2>Journey for the Golden Fleece</h2>

  <!-- ✨ UPDATED BUTTON TEXT -->
  <button class="play-btn" onclick="startGame()">BEGIN YOUR ODYSSEY</button>
</div>

<script>
function startGame() {
  window.location.href = "players.html";
}
</script>

</body>
</html>
