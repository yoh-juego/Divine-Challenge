<!DOCTYPE html>
<html>
<head>
  <title>Divine Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-bar">
  <div id="chance">Chance: 1</div>
  <div id="turn">Loading...</div>
  <div id="timer">Time: 30</div>
</div>

<div id="countdownScreen" class="countdown hidden">
  <h1 id="countText"></h1>
</div>

<div id="gameScreen">
  <div class="board" id="board"></div>
</div>

<div id="popup" class="popup hidden">
  <h1 id="winnerText"></h1>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
