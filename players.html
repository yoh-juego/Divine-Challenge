<!DOCTYPE html>
<html>
<head>
  <title>Choose Characters</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;

      display: flex;
      flex-direction: column;
      align-items: center;

      background: linear-gradient(to right, #a1ffce, #faffd1);
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: space-around;
      width: 100%;
      margin-top: 20px;
    }

    .player {
      width: 40%;
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 15px;
    }

    .gods {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .god {
      padding: 10px;
      background: violet;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    .selected {
      background: gold;
      color: black;
    }

    button {
      margin-top: 20px;
      padding: 10px 30px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>Choose Your Character</h1>

<div class="container">

  <!-- PLAYER 1 -->
  <div class="player">
    <h2>Player 1</h2>
    <input id="p1name" placeholder="Enter name">

    <div class="gods" id="p1gods"></div>
  </div>

  <!-- PLAYER 2 -->
  <div class="player">
    <h2>Player 2</h2>
    <input id="p2name" placeholder="Enter name">

    <div class="gods" id="p2gods"></div>
  </div>

</div>

<button onclick="startGame()">Start Game</button>

<script>
const gods = [
  "Zeus","Hera","Poseidon","Athena",
  "Apollo","Artemis","Ares","Aphrodite",
  "Hephaestus","Hermes","Hestia","Dionysus"
];

let p1choice = "";
let p2choice = "";

// CREATE GOD BOXES
function createGods(containerId, player) {
  let container = document.getElementById(containerId);

  gods.forEach(god => {
    let div = document.createElement("div");
    div.innerText = god;
    div.className = "god";

    div.onclick = () => {
      let all = container.querySelectorAll(".god");
      all.forEach(g => g.classList.remove("selected"));

      div.classList.add("selected");

      if(player === 1) p1choice = god;
      else p2choice = god;
    };

    container.appendChild(div);
  });
}

createGods("p1gods",1);
createGods("p2gods",2);

// START GAME
function startGame() {
  let name1 = document.getElementById("p1name").value || "Player 1";
  let name2 = document.getElementById("p2name").value || "Player 2";

  localStorage.setItem("player1God", name1);
  localStorage.setItem("player2God", name2);

  /* 🔥 IMPORTANT CHANGE HERE */
  window.location.href = "game.html";
}
</script>

</body>
</html>
