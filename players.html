<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Players Setup</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;

      /* 🔥 BACKGROUND IMAGE */
      background: url("player.jpg.jpeg") no-repeat center center/cover;

      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 80%;
      max-width: 900px;
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      padding: 30px;
      color: white;

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player {
      width: 40%;
      text-align: center;
    }

    .player h2 {
      margin-bottom: 10px;
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    .center {
      text-align: center;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: gold;
      cursor: pointer;
    }

    button:hover {
      background: orange;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- PLAYER 1 -->
    <div class="player">
      <h2>Player 1</h2>

      <p>Give your name</p>
      <input type="text" id="p1" placeholder="Enter name">

      <p>Choose your character</p>
      <select id="c1">
        <option value="Apollo">Apollo</option>
        <option value="Ares">Ares</option>
        <option value="Zeus">Zeus</option>
        <option value="Hera">Hera</option>
        <option value="Poseidon">Poseidon</option>
      </select>
    </div>

    <!-- CENTER BUTTON -->
    <div class="center">
      <button onclick="startGame()">START GAME</button>
    </div>

    <!-- PLAYER 2 -->
    <div class="player">
      <h2>Player 2</h2>

      <p>Give your name</p>
      <input type="text" id="p2" placeholder="Enter name">

      <p>Choose your character</p>
      <select id="c2">
        <option value="Apollo">Apollo</option>
        <option value="Ares">Ares</option>
        <option value="Zeus">Zeus</option>
        <option value="Hera">Hera</option>
        <option value="Poseidon">Poseidon</option>
      </select>
    </div>

  </div>

  <script>
    function startGame(){
      let p1 = document.getElementById("p1").value;
      let p2 = document.getElementById("p2").value;
      let c1 = document.getElementById("c1").value;
      let c2 = document.getElementById("c2").value;

      if(!p1 || !p2){
        alert("Enter both player names!");
        return;
      }

      localStorage.setItem("p1", p1);
      localStorage.setItem("p2", p2);
      localStorage.setItem("c1", c1);
      localStorage.setItem("c2", c2);

      window.location.href = "game.html";
    }
  </script>

</body>
</html>
