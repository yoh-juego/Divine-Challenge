<!DOCTYPE html>
<html>
<head>
  <title>Choose Players</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
    }

    .side {
      width: 40%;
      padding: 30px;
      text-align: center;
    }

    .center {
      width: 20%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-left: 2px solid white;
      border-right: 2px solid white;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 70%;
      font-size: 16px;
    }

    .god {
      padding: 10px 20px;
      margin: 5px;
      background: purple;
      border-radius: 10px;
      cursor: pointer;
    }

    .selected {
      background: gold;
      color: black;
    }

    button {
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 18px;
      background: gold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="side">
  <h2>Player 1</h2>
  <p>Give your name</p>
  <input id="p1name">

  <p>Choose your character</p>
  <div id="p1choice"></div>
</div>

<div class="center">
  <h3>Choose Gods</h3>
  <div id="godList"></div>
  <button onclick="startGame()">Start Game</button>
</div>

<div class="side">
  <h2>Player 2</h2>
  <p>Give your name</p>
  <input id="p2name">

  <p>Choose your character</p>
  <div id="p2choice"></div>
</div>

<script>
let gods = ["Zeus","Hera","Poseidon","Athena","Apollo","Artemis","Ares","Aphrodite","Hephaestus","Hermes"];

let p1God=null, p2God=null;

let godList = document.getElementById("godList");

gods.forEach(g=>{
  let div = document.createElement("div");
  div.className="god";
  div.innerText=g;

  div.onclick=()=>{
    if(!p1God){
      p1God=g;
      document.getElementById("p1choice").innerText=g;
      div.classList.add("selected");
    }
    else if(!p2God){
      p2God=g;
      document.getElementById("p2choice").innerText=g;
      div.classList.add("selected");
    }
  };

  godList.appendChild(div);
});

function startGame(){
  let name1 = document.getElementById("p1name").value || "Player 1";
  let name2 = document.getElementById("p2name").value || "Player 2";

  localStorage.setItem("player1God", name1 + " (" + p1God + ")");
  localStorage.setItem("player2God", name2 + " (" + p2God + ")");

  window.location.href = "game.html";
}
</script>

</body>
</html>
